[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./" }]

# HyperEVM RPC
[rpc_endpoints]
hyperliquid_testnet = "https://api.hyperliquid-testnet.xyz/evm"
hyperliquid_mainnet = "https://api.hyperliquid.xyz/evm"

[etherscan]
hyperliquid_testnet = { key = "verify", chain = 998, url = "https://explorer.hyperliquid-testnet.xyz/api" }

[profile.default.aliases]
test = "test"
script = "script"
